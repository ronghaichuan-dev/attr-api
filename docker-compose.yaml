services:
  # ========================
  # 基础设施服务
  # ========================

  localstack:
    image: localstack/localstack:latest
    container_name: god-help-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,sns
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - PORT_WEB_UI=8080
      - LAMBDA_EXECUTOR=docker-reuse
      - EAGER_SERVICE_LOADING=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================
  # 应用服务
  # ========================
  admin-svc:
    build:
      context: .
      dockerfile: cmd/admin-svc/Dockerfile
    image: admin-svc:latest
    container_name: god-help-admin-svc
    restart: unless-stopped
    ports:
      - "8802:8802"
    volumes:
      - ./cmd/admin-svc/config:/app/config

  job-svc:
    build:
      context: .
      dockerfile: cmd/job-svc/Dockerfile
    image: job-svc:latest
    container_name: god-help-job-svc
    restart: unless-stopped
    ports:
      - "8803:8803"
    volumes:
      - ./cmd/job-svc/config:/app/config

  notification-svc:
    build:
      context: .
      dockerfile: cmd/notification-svc/Dockerfile
    image: notification-svc:latest
    container_name: god-help-notification-svc
    restart: unless-stopped
    ports:
      - "8801:8801"
    volumes:
      - ./cmd/notification-svc/config:/app/config
    depends_on:
      localstack:
        condition: service_healthy

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
